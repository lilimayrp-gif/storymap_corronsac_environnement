<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Storymap – Enjeux environnementaux de Corronsac</title>

  <!-- Feuilles de style -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    body {
      margin: 0;
      font-family: "Inter", sans-serif;
      background: #f7f7f7;
      color: #222;
    }

    .section {
      display: none;
      padding: 40px 8%;
      max-width: 1200px;
      margin: auto;
    }
    .section.visible {
      display: block;
    }

    h1, h2 {
      font-weight: 700;
      margin-bottom: 10px;
    }

    .divider {
      width: 60px;
      height: 4px;
      background: #e07b39;
      margin: 20px 0;
      border-radius: 4px;
    }

    /* Navigation */
    .sm-nav {
      position: fixed;
      top: 0;
      width: 100%;
      background: #ffffffee;
      backdrop-filter: blur(6px);
      border-bottom: 1px solid #ddd;
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 12px 0;
      z-index: 1000;
    }
    .sm-nav-btn {
      cursor: pointer;
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 15px;
      transition: 0.2s;
    }
    .sm-nav-btn:hover {
      background: #eee;
    }
    .sm-nav-btn.active {
      background: #e07b39;
      color: white;
    }

    /* Carte */
    #mapOccSol {
      width: 100%;
      height: 420px;
      border-radius: 10px;
      margin-top: 20px;
    }

    /* Préconisations */
    .preconisation {
      display: flex;
      align-items: flex-start;
      margin: 18px 0;
    }
    .prec-num {
      width: 36px;
      height: 36px;
      background: #e07b39;
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      margin-right: 14px;
    }

    .footer-sm {
      text-align: center;
      padding: 30px 0;
      font-size: 13px;
      color: #666;
    }
  </style>

  <!-- Leaflet -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>

<body>

<!-- NAVIGATION -->
<div class="sm-nav">
  <div class="sm-nav-btn active" onclick="showSection('intro')">Introduction</div>
  <div class="sm-nav-btn" onclick="showSection('occsol')">Occupation du sol</div>
  <div class="sm-nav-btn" onclick="showSection('risques')">Risques</div>
  <div class="sm-nav-btn" onclick="showSection('dashboard')">Dashboard</div>
  <div class="sm-nav-btn" onclick="showSection('scenarios')">Scénarios</div>
  <div class="sm-nav-btn" onclick="showSection('preco')">Préconisations</div>
</div>

<!-- SECTION INTRO -->
<div class="section visible" id="sec-intro">
  <h1>Corronsac – Enjeux environnementaux</h1>
  <div class="divider"></div>
  <p>Analyse territoriale, trajectoires d’urbanisation, risques, biodiversité et recommandations stratégiques.</p>
</div>

<!-- ============================
     SCRIPTS – NAVIGATION
============================= -->
<script>
function showSection(section) {
  document.querySelectorAll('.section').forEach(sec => sec.classList.remove('visible'));
  document.querySelectorAll('.sm-nav-btn').forEach(btn => btn.classList.remove('active'));

  document.getElementById('sec-' + section).classList.add('visible');

  document.querySelectorAll('.sm-nav-btn').forEach(btn => {
    if (btn.textContent.toLowerCase().includes(section)) {
      btn.classList.add('active');
    }
  });
}
</script>

<!-- ============================
     LEAFLET – CARTE OCCUPATION DU SOL
============================= -->
<script>
const map = L.map('mapOccSol').setView([43.495, 1.533], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '© OpenStreetMap'
}).addTo(map);

// Exemple de polygone (à remplacer par tes données)
const zone = L.polygon([
  [43.497, 1.528],
  [43.493, 1.532],
  [43.496, 1.538]
], { color: 'orange' }).addTo(map);

zone.bindPopup("Zone d'évolution de l'urbanisation");
</script>

<!-- ============================
     CHART.JS – GRAPHIQUES
============================= -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
// Occupation du sol
new Chart(document.getElementById('chartOccSol'), {
  type: 'bar',
  data: {
    labels: ['2000', '2010', '2020'],
    datasets: [{
      label: 'Surface urbanisée (ha)',
      data: [45, 58, 72],
      backgroundColor: '#e07b39'
    }]
  }
});

// Carbone
new Chart(document.getElementById('chartCarbone'), {
  type: 'line',
  data: {
    labels: ['2010', '2015', '2020'],
    datasets: [{
      label: 'Émissions (tCO2/hab)',
      data: [6.2, 5.4, 4.9],
      borderColor: '#e07b39',
      fill: false
    }]
  }
});

// Logement
new Chart(document.getElementById('chartLogement'), {
  type: 'pie',
  data: {
    labels: ['Maisons', 'Appartements'],
    datasets: [{
      data: [82, 18],
      backgroundColor: ['#e07b39', '#555']
    }]
  }
});

// ZAN
new Chart(document.getElementById('chartZAN'), {
  type: 'bar',
  data: {
    labels: ['2010', '2020', '2030', '2040'],
    datasets: [{
      label: 'Artificialisation cumulée (ha)',
      data: [40, 55, 60, 62],
      backgroundColor: '#e07b39'
    }]
  }
});

// Radar
new Chart(document.getElementById('chartRadar'), {
  type: 'radar',
  data: {
    labels: ['Biodiversité', 'Eau', 'Agriculture', 'Mobilité', 'Risques'],
    datasets: [{
      label: 'Niveau d’enjeu',
      data: [4, 3, 5, 2, 4],
      backgroundColor: 'rgba(224,123,57,0.3)',
      borderColor: '#e07b39'
    }]
  }
});
</script>

<!-- ============================
     FOOTER
============================= -->
<div class="footer-sm">
  © 2024 – Storymap Corronsac – Analyse environnementale
</div>

</body>
</html>
