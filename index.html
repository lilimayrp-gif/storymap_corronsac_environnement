<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Storymap Corronsac – Version simple</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f5f5f5;
    }

    nav {
      display: flex;
      background: #2d6a4f;
      padding: 10px;
      gap: 10px;
    }

    nav button {
      background: white;
      border: none;
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    nav button.active {
      background: #95d5b2;
    }

    .section {
      display: none;
      padding: 20px;
      max-width: 800px;
      margin: auto;
      background: white;
      margin-top: 20px;
      border-radius: 8px;
    }

    .section.visible {
      display: block;
    }

    h2 {
      color: #2d6a4f;
    }
  </style>
</head>

<body>

<nav>
  <button onclick="showSection('intro')" class="active">Introduction</button>
  <button onclick="showSection('territoire')">Territoire</button>
  <button onclick="showSection('enjeux')">Enjeux</button>
</nav>

<div id="intro" class="section visible">
  <h2>Introduction</h2>
  <p>Bienvenue dans la version simplifiée de la storymap de Corronsac.</p>
</div>

<div id="territoire" class="section">
  <h2>Le territoire</h2>
  <p>Description simple du territoire.</p>
</div>

<div id="enjeux" class="section">
  <h2>Enjeux environnementaux</h2>
  <p>Présentation des enjeux principaux.</p>
</div>

<script>
function showSection(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('visible'));
  document.getElementById(id).classList.add('visible');

  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}
</script>

</body>
</html>
